<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa Galeria ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#fdebf1,#f8e0e8);
text-align:center;
}

header{
padding:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.gallery-item{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.gallery-media{
width:100%;
display:block;
}

.gallery-caption{
padding:10px;
font-size:14px;
}

.gallery-actions{
padding:10px;
}

.mini-btn{
background:#ff6b9d;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.lightbox.open{
display:flex;
}

#lightboxContent img,
#lightboxContent video{
max-width:90vw;
max-height:90vh;
}

.heart-fall{
position:fixed;
top:-20px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh)}
}

</style>
</head>

<body>

<header>
<h1>Nossa Galeria ❤️</h1>
<div id="contadorDias"></div>
</header>

<div style="margin-bottom:15px;">
<input type="file" id="mediaUpload" multiple>
<input type="file" id="backgroundUpload">
<input type="file" id="musicUpload">
<button id="clearBackgroundBtn">Remover Fundo</button>
</div>

<audio id="musicPlayer" controls autoplay loop></audio>

<div style="margin-bottom:15px;">
<button data-filter="all">Todos</button>
<button data-filter="foto">Fotos</button>
<button data-filter="video">Vídeos</button>
</div>

<div id="galleryGrid" class="gallery"></div>

<div id="lightbox" class="lightbox">
<div id="lightboxContent"></div>
<button id="lightboxClose" style="position:absolute;top:20px;right:20px;">X</button>
</div>

<div id="hearts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
