<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Walisson & Beatriz</title>

<style>
body{
  background: linear-gradient(#ffe6f0,#ffffff);
  font-family: Arial;
  text-align: center;
  margin:0;
}

header{
  background:#ff4d88;
  color:white;
  padding:30px;
  font-size:30px;
}

.container{
  padding:40px;
}

button{
  background:#ff4d88;
  border:none;
  padding:15px;
  color:white;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#ff0066;
}

footer{
  margin-top:50px;
  padding:20px;
  background:#eee;
}
</style>
</head>

<body>

<header>
  ❤️ Walisson & Beatriz ❤️
</header>

<div class="container">
  <h1>Bem-vinda ao nosso site</h1>

  <p>
    Esse site foi criado com muito carinho para você.
  </p>
<img src="foto.jpg" alt="Nossa foto" class="foto">
  <button onclick="mensagem()">
    Clique aqui
  </button>

  <p id="msg"></p>
</div>

<footer>
  Feito com amor por Walisson
</footer>

<script>
function mensagem(){
  document.getElementById("msg").innerHTML =
  "Você é muito especial para mim ❤️";
}
</script>

</body>
</html>
